name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run check:type-sync
      - run: npm test
      - name: Smoke test the agent demo
        run: npm run demo

  shopify-app:
    name: Shopify plugin — typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shopify-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: shopify-app/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm test

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t ava-pay-api:ci .
